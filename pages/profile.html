<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>My Profile | Narok County</title><link rel="stylesheet" href="../assets/css/output.css"></head><body class="bg-slate-100 text-slate-800"><header class="border-b bg-white"><div class="mx-auto flex max-w-4xl items-center justify-between px-4 py-4"><a href="dashboard.html" class="font-bold text-county-green">← Student dashboard</a><button data-sign-out class="text-sm font-semibold">Sign out</button></div></header><main class="mx-auto max-w-3xl px-4 py-10"><p class="text-sm font-bold uppercase tracking-wider text-county-green">Student portal</p><h1 class="mt-2 text-3xl font-bold">My attachment details</h1><p class="mt-2 text-slate-600">Provide your institution and planned attachment dates.</p><div id="alert" class="mt-6 hidden rounded-md border px-4 py-3 text-sm"></div><form id="profile-form" class="mt-6 rounded-xl bg-white p-6 shadow-sm"><div class="grid gap-5 sm:grid-cols-2"><label class="text-sm font-semibold sm:col-span-2">Full name<input name="full_name" required class="mt-1.5 w-full rounded-md border p-2.5 font-normal"></label><label class="text-sm font-semibold">Email address<input id="email" disabled class="mt-1.5 w-full rounded-md border bg-slate-100 p-2.5 font-normal text-slate-500"></label><label class="text-sm font-semibold">Phone number<input name="phone" required class="mt-1.5 w-full rounded-md border p-2.5 font-normal"></label><label class="text-sm font-semibold">National ID / Passport<input name="national_id" required class="mt-1.5 w-full rounded-md border p-2.5 font-normal"></label><label class="text-sm font-semibold">Institution<input name="institution" required class="mt-1.5 w-full rounded-md border p-2.5 font-normal"></label><label class="text-sm font-semibold sm:col-span-2">Course / programme<input name="course" required class="mt-1.5 w-full rounded-md border p-2.5 font-normal"></label><label class="text-sm font-semibold">Attachment start date<input name="attachment_start_date" type="date" required class="mt-1.5 w-full rounded-md border p-2.5 font-normal"></label><label class="text-sm font-semibold">Attachment end date<input name="attachment_end_date" type="date" required class="mt-1.5 w-full rounded-md border p-2.5 font-normal"></label></div><button class="mt-6 rounded-md bg-county-green px-5 py-3 text-sm font-bold text-white">Save details</button></form></main><script type="module" src="../assets/js/profile.js"></script></body></html>
