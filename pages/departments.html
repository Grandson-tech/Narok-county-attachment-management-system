<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Departments | Narok County</title><link rel="stylesheet" href="../assets/css/output.css"></head><body class="bg-slate-100"><main class="mx-auto max-w-4xl px-4 py-10"><a href="admin-dashboard.html" class="font-bold text-county-green">← Admin dashboard</a><h1 class="mt-5 text-3xl font-bold">Departments</h1><p class="mt-2 text-slate-600">Available placement departments.</p><div id="list" class="mt-6 divide-y rounded-xl bg-white shadow-sm"></div></main><script type="module">import {supabase} from '../assets/js/supabase.js';const {data,error}=await supabase.from('departments').select('name,description').order('name');document.querySelector('#list').innerHTML=error?'<p class="p-5 text-red-700">Unable to load departments.</p>':data.map(x=>`<article class="p-5"><h2 class="font-bold">${x.name}</h2><p class="mt-1 text-sm text-slate-600">${x.description??''}</p></article>`).join('')||'<p class="p-5 text-slate-500">No departments available.</p>';</script></body></html>
