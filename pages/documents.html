<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Acceptance Letter | Narok County</title><link rel="stylesheet" href="../assets/css/output.css"></head><body class="bg-slate-100 text-slate-800"><header class="border-b bg-white"><div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4"><a href="dashboard.html" class="font-bold text-county-green">← Student dashboard</a><button data-sign-out class="text-sm font-semibold text-slate-600">Sign out</button></div></header><main class="mx-auto max-w-4xl px-4 py-10"><p class="text-sm font-bold uppercase tracking-wider text-county-green">Student portal</p><h1 class="mt-2 text-3xl font-bold">Acceptance letter</h1><p class="mt-2 text-slate-600">Upload one acceptance letter. You can remove it while its status is Pending if you selected the wrong file.</p><div id="alert" class="mt-6 hidden rounded-md border px-4 py-3 text-sm"></div><form id="upload-form" class="mt-6 rounded-xl bg-white p-6 shadow-sm"><input name="documentType" type="hidden" value="application_letter"><label class="block text-sm font-semibold">Acceptance letter file<input name="file" type="file" required accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" class="mt-2 block w-full rounded-md border p-2"><span class="mt-2 block text-xs font-normal text-slate-500">PDF, Word, JPG, or PNG; maximum 10 MB.</span></label><button class="mt-5 rounded-md bg-county-green px-5 py-3 text-sm font-bold text-white">Upload acceptance letter</button></form><section class="mt-8 overflow-hidden rounded-xl bg-white shadow-sm"><div class="border-b p-5"><h2 class="font-bold">Letter status</h2><p class="mt-1 text-sm text-slate-600">Pending means HR has not yet reviewed the letter.</p></div><div id="documents-list" class="divide-y"></div></section></main><script type="module" src="../assets/js/upload.js"></script></body></html>
