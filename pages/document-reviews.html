<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Document Reviews | NCAMS</title><link rel="stylesheet" href="../assets/css/output.css"></head><body class="bg-slate-100 text-slate-800"><header class="bg-county-green text-white"><div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4"><a href="admin-dashboard.html" class="font-bold">← Administration dashboard</a><button data-sign-out class="rounded border border-white/30 px-3 py-2 text-sm font-semibold">Sign out</button></div></header><main class="mx-auto max-w-7xl px-4 py-8"><section class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between"><div><p class="text-sm font-bold uppercase tracking-wider text-county-green">HR and administration</p><h1 class="mt-1 text-3xl font-bold">Document reviews</h1><p class="mt-2 text-slate-600">Review student uploads securely and record verification decisions.</p></div><a href="admin-dashboard.html" class="text-sm font-bold text-county-green hover:underline">Student index →</a></section><div id="alert" class="mt-6 hidden rounded-md border px-4 py-3 text-sm"></div><section class="mt-7 grid gap-4 sm:grid-cols-2 lg:grid-cols-4"><article class="rounded-xl bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">All documents</p><p id="all-count" class="mt-2 text-3xl font-bold">—</p></article><article class="rounded-xl bg-white p-5 shadow-sm"><p class="text-sm text-amber-700">Pending review</p><p id="pending-count" class="mt-2 text-3xl font-bold">—</p></article><article class="rounded-xl bg-white p-5 shadow-sm"><p class="text-sm text-emerald-700">Approved</p><p id="approved-count" class="mt-2 text-3xl font-bold">—</p></article><article class="rounded-xl bg-white p-5 shadow-sm"><p class="text-sm text-red-700">Rejected</p><p id="rejected-count" class="mt-2 text-3xl font-bold">—</p></article></section><section class="mt-7 overflow-hidden rounded-xl bg-white shadow-sm"><div class="grid gap-3 border-b p-5 sm:grid-cols-2 lg:grid-cols-5"><input id="search" class="rounded-md border border-slate-300 px-3 py-2 text-sm" placeholder="Search student or file"><select id="institution-filter" class="rounded-md border border-slate-300 px-3 py-2 text-sm"><option value="">All institutions</option></select><select id="type-filter" class="rounded-md border border-slate-300 px-3 py-2 text-sm"><option value="">All document types</option></select><select id="status-filter" class="rounded-md border border-slate-300 px-3 py-2 text-sm"><option value="">All verification states</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select><input id="date-filter" type="date" class="rounded-md border border-slate-300 px-3 py-2 text-sm" title="Uploaded on date"></div><div id="documents-grid" class="grid gap-4 p-5 sm:grid-cols-1 lg:grid-cols-2"></div></section></main><dialog id="preview-modal" class="w-[min(90vw,1000px)] rounded-xl p-0 shadow-2xl backdrop:bg-slate-950/60"><div class="flex items-center justify-between border-b p-4"><h2 id="preview-title" class="font-bold">Document preview</h2><button id="close-preview" class="rounded p-2 text-slate-600 hover:bg-slate-100" aria-label="Close preview">✕</button></div><div id="preview-content" class="h-[70vh] bg-slate-100"></div></dialog><script type="module" src="../assets/js/reviews.js"></script></body></html>
