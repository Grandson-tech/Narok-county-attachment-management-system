<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reset your Narok County Attachment Management System password." />
    <title>Reset Password | Narok County</title>
    <link rel="stylesheet" href="assets/css/output.css" />
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>
  <body class="grid min-h-screen place-items-center bg-slate-100 px-4 py-10 text-slate-800">
    <main class="w-full max-w-md rounded-xl bg-white p-6 shadow-sm sm:p-8">
      <a href="index.html" class="flex items-center gap-2 text-sm font-bold text-county-green"><span class="grid h-8 w-8 place-items-center rounded-full bg-county-green text-xs text-white">NC</span> Narok County</a>
      <section id="request-reset-section" class="mt-8">
        <p class="text-sm font-bold uppercase tracking-wider text-county-green">Account recovery</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-900">Reset your password</h1>
        <p class="mt-2 text-sm leading-6 text-slate-600">Enter the email address linked to your account. We will send a secure reset link.</p>
        <div id="request-alert" class="mt-6 hidden rounded-md border px-4 py-3 text-sm" role="alert"></div>
        <form id="request-reset-form" class="mt-7 space-y-5">
          <div><label for="email" class="mb-1.5 block text-sm font-semibold text-slate-700">Email address</label><input id="email" name="email" type="email" autocomplete="email" required class="w-full rounded-md border border-slate-300 px-3 py-2.5 outline-none focus:border-county-green focus:ring-2 focus:ring-emerald-100" /></div>
          <button id="request-button" class="w-full rounded-md bg-county-green px-4 py-3 text-sm font-bold text-white hover:bg-emerald-800 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Send reset link</button>
        </form>
      </section>

      <section id="update-password-section" class="mt-8 hidden">
        <p class="text-sm font-bold uppercase tracking-wider text-county-green">Account recovery</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-900">Set a new password</h1>
        <p class="mt-2 text-sm leading-6 text-slate-600">Choose a new password for your account.</p>
        <div id="update-alert" class="mt-6 hidden rounded-md border px-4 py-3 text-sm" role="alert"></div>
        <form id="update-password-form" class="mt-7 space-y-5">
          <div><label for="new-password" class="mb-1.5 block text-sm font-semibold text-slate-700">New password</label><input id="new-password" name="password" type="password" autocomplete="new-password" minlength="8" required class="w-full rounded-md border border-slate-300 px-3 py-2.5 outline-none focus:border-county-green focus:ring-2 focus:ring-emerald-100" /><p class="mt-1 text-xs text-slate-500">Use at least 8 characters.</p></div>
          <div><label for="confirm-password" class="mb-1.5 block text-sm font-semibold text-slate-700">Confirm new password</label><input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required class="w-full rounded-md border border-slate-300 px-3 py-2.5 outline-none focus:border-county-green focus:ring-2 focus:ring-emerald-100" /></div>
          <button id="update-button" class="w-full rounded-md bg-county-green px-4 py-3 text-sm font-bold text-white hover:bg-emerald-800 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Update password</button>
        </form>
      </section>
      <p class="mt-7 text-center text-sm text-slate-600"><a href="login.html" class="font-bold text-county-green hover:underline">Back to sign in</a></p>
    </main>
    <script type="module" src="assets/js/forgot-password.js"></script>
  </body>
</html>
